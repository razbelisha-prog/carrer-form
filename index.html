<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Raz Belisha — Career Form</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: #fafafa;
      color: #1a1a1a;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    header {
      width: 100%;
      padding: 28px 40px;
      border-bottom: 1px solid #ebebeb;
      background: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    header h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 22px;
      font-weight: 500;
      letter-spacing: 0.04em;
      color: #1a1a1a;
    }

    /* ── INTAKE OPENING PANEL ─────────────────────────────────────────────── */
    #intake-panel {
      width: 100%;
      max-width: 720px;
      padding: 40px 24px 60px;
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    .intake-lead {
      font-family: 'Cormorant Garamond', serif;
      font-size: 26px;
      font-weight: 500;
      line-height: 1.4;
      color: #1a1a1a;
      margin-bottom: 32px;
    }

    .intake-lead span {
      color: #888;
      font-weight: 400;
    }

    .intake-section {
      margin-bottom: 28px;
    }

    .intake-section label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: #555;
      margin-bottom: 10px;
    }

    .intake-section label .optional {
      font-weight: 400;
      text-transform: none;
      letter-spacing: 0;
      color: #999;
      font-size: 12px;
      margin-left: 6px;
    }

    .upload-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
    }

    /* Upload zone — idle state */
    .upload-zone {
      border: 1.5px dashed #ddd;
      border-radius: 12px;
      padding: 22px 20px;
      display: flex;
      align-items: center;
      gap: 14px;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      background: #fff;
      margin-bottom: 12px;
    }

    .upload-zone:hover { border-color: #aaa; background: #fafafa; }

    .upload-zone-icon {
      font-size: 26px;
      line-height: 1;
      flex-shrink: 0;
    }

    .upload-zone-text strong {
      display: block;
      font-size: 14px;
      font-weight: 500;
      color: #1a1a1a;
      margin-bottom: 2px;
    }

    .upload-zone-text span {
      font-size: 12px;
      color: #aaa;
    }

    /* Upload zone — file selected state */
    .upload-zone.uploaded {
      border-style: solid;
      border-color: #22a06b;
      background: #f6fef9;
      cursor: default;
    }

    .upload-zone.uploaded:hover { background: #f6fef9; border-color: #22a06b; }

    .upload-zone.uploaded .upload-zone-icon { font-size: 22px; }

    .upload-success-name {
      font-size: 14px;
      font-weight: 500;
      color: #1a1a1a;
      margin-bottom: 2px;
    }

    .upload-success-sub {
      font-size: 12px;
      color: #22a06b;
    }

    .upload-remove {
      margin-left: auto;
      font-size: 12px;
      color: #aaa;
      cursor: pointer;
      background: none;
      border: none;
      padding: 4px 8px;
      border-radius: 6px;
      font-family: 'DM Sans', sans-serif;
      transition: color 0.15s, background 0.15s;
      flex-shrink: 0;
    }

    .upload-remove:hover { color: #c0392b; background: #fff0ee; }

    /* Paste divider — shown only when no file uploaded */
    .paste-divider {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
    }

    .paste-divider::before,
    .paste-divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: #eee;
    }

    .paste-divider span {
      font-size: 11px;
      color: #bbb;
      white-space: nowrap;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    #resume-file { display: none; }

    .intake-textarea {
      width: 100%;
      border: 1px solid #ddd;
      border-radius: 12px;
      padding: 14px 16px;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      line-height: 1.6;
      color: #1a1a1a;
      background: #fff;
      resize: vertical;
      outline: none;
      transition: border-color 0.2s;
      min-height: 120px;
    }

    .intake-textarea:focus { border-color: #999; }
    .intake-textarea::placeholder { color: #bbb; }

    #jd-text { min-height: 100px; }

    .jd-label {
      font-size: 12px;
      font-weight: 500;
      color: #888;
      letter-spacing: 0.04em;
      margin-bottom: 6px;
      margin-top: 14px;
    }

    .jd-label:first-of-type { margin-top: 0; }

    .jd-label .optional {
      font-weight: 400;
      color: #bbb;
      margin-left: 4px;
    }

    #start-btn {
      background: #1a1a1a;
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 14px 28px;
      font-size: 15px;
      font-family: 'DM Sans', sans-serif;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.2s;
      align-self: flex-start;
      margin-top: 4px;
    }

    #start-btn:hover { background: #333; }
    #start-btn:disabled { background: #ccc; cursor: default; }

    .start-error {
      font-size: 13px;
      color: #c0392b;
      margin-top: 10px;
    }

    /* ── CHAT ─────────────────────────────────────────────────────────────── */
    #chat-wrapper {
      width: 100%;
      max-width: 720px;
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 32px 24px 0;
      display: none;
    }

    #messages {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 20px;
      padding-bottom: 24px;
    }

    .msg {
      display: flex;
      flex-direction: column;
      max-width: 82%;
    }

    .msg.assistant { align-self: flex-start; }
    .msg.user { align-self: flex-end; }

    .bubble {
      padding: 14px 18px;
      border-radius: 16px;
      font-size: 15px;
      line-height: 1.65;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .msg.assistant .bubble {
      background: #fff;
      border: 1px solid #e8e8e8;
      border-bottom-left-radius: 4px;
      color: #1a1a1a;
    }

    .msg.user .bubble {
      background: #1a1a1a;
      color: #fff;
      border-bottom-right-radius: 4px;
    }

    .typing-indicator {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 14px 18px;
      background: #fff;
      border: 1px solid #e8e8e8;
      border-radius: 16px;
      border-bottom-left-radius: 4px;
      width: fit-content;
    }

    .typing-indicator span {
      width: 7px;
      height: 7px;
      background: #bbb;
      border-radius: 50%;
      animation: bounce 1.2s infinite;
    }

    .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
    .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); }
      30% { transform: translateY(-6px); }
    }

    /* ── MULTI-SELECT OPTIONS ─────────────────────────────────────────────── */
    .options-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-top: 10px;
      align-self: flex-start;
      width: 100%;
      max-width: 500px;
    }

    .option-btn {
      background: #fff;
      border: 1.5px solid #ddd;
      border-radius: 10px;
      padding: 10px 16px;
      font-size: 14px;
      font-family: 'DM Sans', sans-serif;
      color: #1a1a1a;
      cursor: pointer;
      text-align: left;
      transition: background 0.15s, border-color 0.15s;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .option-btn .check {
      width: 18px;
      height: 18px;
      border: 1.5px solid #ccc;
      border-radius: 5px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s, border-color 0.15s;
      font-size: 11px;
      color: transparent;
    }

    .option-btn:hover { background: #f7f7f7; border-color: #bbb; }
    .option-btn:hover .check { border-color: #999; }

    .option-btn.selected {
      background: #f0f0f0;
      border-color: #1a1a1a;
    }

    .option-btn.selected .check {
      background: #1a1a1a;
      border-color: #1a1a1a;
      color: #fff;
    }

    .option-btn:disabled {
      opacity: 0.45;
      cursor: default;
    }

    .other-input {
      border: 1px solid #ddd;
      border-radius: 8px;
      padding: 9px 13px;
      font-size: 14px;
      font-family: 'DM Sans', sans-serif;
      color: #1a1a1a;
      outline: none;
      width: 100%;
      transition: border-color 0.2s;
      display: none;
    }

    .other-input:focus { border-color: #999; }
    .other-input.visible { display: block; }

    .confirm-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-top: 4px;
    }

    .confirm-btn {
      background: #1a1a1a;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 9px 18px;
      font-size: 13px;
      font-family: 'DM Sans', sans-serif;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s;
      display: none;
    }

    .confirm-btn.visible { display: inline-block; }
    .confirm-btn:hover { background: #333; }
    .confirm-btn:disabled { background: #ccc; cursor: default; }

    /* ── INPUT BAR ────────────────────────────────────────────────────────── */
    #input-area {
      position: sticky;
      bottom: 0;
      background: #fafafa;
      padding: 16px 0 28px;
      width: 100%;
      max-width: 720px;
    }

    #input-row {
      display: flex;
      align-items: flex-end;
      gap: 10px;
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 14px;
      padding: 10px 14px;
      transition: border-color 0.2s;
    }

    #input-row:focus-within { border-color: #999; }

    #user-input {
      flex: 1;
      border: none;
      outline: none;
      resize: none;
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      line-height: 1.5;
      max-height: 160px;
      overflow-y: auto;
      background: transparent;
      color: #1a1a1a;
    }

    #send-btn {
      background: #1a1a1a;
      color: #fff;
      border: none;
      border-radius: 9px;
      padding: 8px 14px;
      font-size: 14px;
      font-family: 'DM Sans', sans-serif;
      cursor: pointer;
      transition: background 0.2s;
      white-space: nowrap;
    }

    #send-btn:hover { background: #333; }
    #send-btn:disabled { background: #ccc; cursor: default; }

    #status-note {
      text-align: center;
      font-size: 12px;
      color: #aaa;
      margin-top: 10px;
    }

    /* ── BOTTOM INPUT WRAPPER ─────────────────────────────────────────────── */
    #input-wrapper {
      width: 100%;
      max-width: 720px;
      padding: 0 24px;
      position: sticky;
      bottom: 0;
      background: #fafafa;
      display: none;
    }

    @media (max-width: 480px) {
      header { padding: 20px; }
      header h1 { font-size: 18px; }
      #intake-panel { padding: 28px 16px 40px; }
      #chat-wrapper { padding: 20px 16px 0; }
      .msg { max-width: 92%; }
      .intake-lead { font-size: 21px; }
    }
  </style>
</head>
<body>

<header>
  <h1>Raz Belisha — Career Form</h1>
</header>

<!-- ── OPENING PANEL ──────────────────────────────────────────────────────── -->
<div id="intake-panel">
  <p class="intake-lead">Raz Belisha Career Form.<br><span>Share your background and the roles you're going after.</span></p>

  <div class="intake-section">
    <label>Your Resume</label>
    <input type="file" id="resume-file" accept=".txt,.pdf,.doc,.docx" />

    <!-- Upload zone (click to pick file) -->
    <div class="upload-zone" id="upload-zone" onclick="document.getElementById('resume-file').click()">
      <div class="upload-zone-icon">📎</div>
      <div class="upload-zone-text">
        <strong>Upload your resume</strong>
        <span>PDF, Word, or TXT</span>
      </div>
    </div>

    <!-- Confirmed upload state (hidden until file picked) -->
    <div class="upload-zone uploaded" id="upload-confirmed" style="display:none;">
      <div class="upload-zone-icon">✅</div>
      <div>
        <div class="upload-success-name" id="upload-filename"></div>
        <div class="upload-success-sub">Resume uploaded</div>
      </div>
      <button class="upload-remove" id="upload-remove-btn" type="button">✕ Remove</button>
    </div>

    <!-- Divider + paste textarea (hidden when file is uploaded) -->
    <div id="paste-area">
      <div class="paste-divider"><span>or paste your resume text</span></div>
      <textarea class="intake-textarea" id="resume-text" placeholder="Paste your resume text here — work history, skills, education, anything you have…" rows="6"></textarea>
    </div>
  </div>

  <div class="intake-section">
    <label>Job Requirements <span class="optional">paste up to 3 positions you're targeting</span></label>

    <p class="jd-label">Position 1</p>
    <textarea class="intake-textarea jd-field" id="jd-1" placeholder="Paste the full job description here…" rows="4"></textarea>

    <p class="jd-label">Position 2 <span class="optional">optional</span></p>
    <textarea class="intake-textarea jd-field" id="jd-2" placeholder="Paste a second job description here…" rows="4"></textarea>

    <p class="jd-label">Position 3 <span class="optional">optional</span></p>
    <textarea class="intake-textarea jd-field" id="jd-3" placeholder="Paste a third job description here…" rows="4"></textarea>
  </div>

  <button id="start-btn">Begin Intake →</button>
  <p class="start-error" id="start-error" style="display:none;"></p>
</div>

<!-- ── CHAT ───────────────────────────────────────────────────────────────── -->
<div id="chat-wrapper">
  <div id="messages"></div>
</div>

<div id="input-wrapper">
  <div id="input-area">
    <div id="input-row">
      <textarea id="user-input" rows="1" placeholder="Type your message…"></textarea>
      <button id="send-btn">Send</button>
    </div>
    <div id="status-note"></div>
  </div>
</div>

<script>
  // ─── CONFIG ───────────────────────────────────────────────────────────────
  const EMAILJS_SERVICE_ID  = 'service_qdwud0q';
  const EMAILJS_TEMPLATE_ID = 'template_sxs0ndy';
  const EMAILJS_PUBLIC_KEY  = 'YnO-AKWxGso54BjDD';
  const RECIPIENT_EMAIL     = 'razbelisha@gmail.com';

  const SYSTEM_PROMPT = `# Raz Belisha Client Form — Intake Assistant

## IDENTITY
You are the intake assistant for Raz Belisha, a professional resume and career consultant.
Your job is to collect everything Raz needs to build a world-class, personalized resume.
You are warm, professional, and feel like a real person — not a bot, not a form.
You ask one thing at a time. You never rush. You never overwhelm.

## CRITICAL RULES
1. You NEVER build a resume. Ever. If asked: "That part is handled personally by Raz."
2. You NEVER show scores, grades, or gap analysis to the client.
3. You ALWAYS give options derived from the resume and job descriptions — never generic defaults.
4. You go one phase at a time. Never jump ahead.
5. You NEVER mention Claude, Anthropic, AI, or that this is automated.
6. When intake is complete, output the JSON block exactly as specified.
7. Options you present must ALWAYS be in the format: "A — [text]", "B — [text]", etc. so they can be clicked.
8. The user can select MULTIPLE options at once. If they respond with something like "A and C" or "A, B", treat all selected options as their answer.

## PHASE 1 — FIRST MESSAGE (resume + job descriptions already provided)
The user's first message contains their resume AND the job descriptions they are targeting.
Do NOT ask them to share anything again. They've already done it.

Detect language from resume:
- Hebrew content / Israeli companies / Israeli universities / Israeli phone → respond in Hebrew for the rest of the conversation
- Otherwise → respond in English
Never ask about language. Just switch naturally.

## PHASE 2 — SILENT ANALYSIS
Internally extract from the resume: title, industry, seniority, skills, tools, achievements, education.
Internally extract from the job descriptions: target role title, required seniority, key requirements, important keywords.
Cross-reference resume vs JDs: sort keywords into confirmed / possible / missing.
Store everything. Show nothing to the client. Move directly to Phase 3.

## PHASE 3 — CONFIRM TARGET ROLE + SENIORITY
Based on the job descriptions provided (primary signal) and the resume (secondary signal), identify the most likely target role and seniority.
Present options derived ONLY from what was shared:

"Based on what you've shared, here's what I'm seeing:
A — [Most likely role title, derived from JDs]
B — [Second option if the JDs suggest multiple roles, or an adjacent role from resume]
C — [Adjacent possibility]
D — Something different (tell me)"

Allow multi-select — they may be open to more than one direction.

Immediately after role, ask seniority in the same message:
"And what level are you targeting?
A — [Detected seniority from JDs]
B — [One level up]
C — [One level down, if relevant]
D — Other"

## PHASE 5A — QUANTIFY ACHIEVEMENTS
Go through achievements from the resume that lack specific numbers. Reference exact resume text:
"You wrote: '[exact text from resume]' — can we add a number?
A — Yes, I can give users/downloads/revenue
B — Yes, I can give growth percentage
C — Yes, I can give timeframe or team size
D — I don't have a number for this one"
If A/B/C selected — ask: "What's the number?"
Store as achievements_quantified.

## PHASE 5B — ACADEMIC (only if resume shows education)
"A quick question about your studies at [institution] — what was your GPA?
A — Prefer not to share
B — Below average, skip it
C — [Number] (I'll type it)"
If strong GPA mentioned: "Any courses above 90, honors, or academic prizes?"

## PHASE 5C — KEYWORD GAP INTERVIEW
For keywords in the "possible" bucket — max 8-10 questions:
"[Keyword] — have you worked with this?
A — Yes, hands-on experience
B — Familiar, used something similar
C — Heard of it, no real experience
D — Never worked with it"
A → keywords_approved
B → keywords_partial
C/D → keywords_missing
NEVER tell the client they are missing something.

## PHASE 5D — PERSONAL LAYER
"Almost done — a few questions that make the resume feel human and personal."

1. "Is there anything you've built or worked on that isn't on your resume?
   A — Yes (tell me below)
   B — Nothing comes to mind"

2. "What do you do outside of work? Hobbies, passions, activities?" (free text)

3. "Is there anything unusual or surprising about you that most people don't expect?" (free text)

4. "How would you describe your working style?
   A — Deep focus, I go all in on one thing
   B — Fast execution, I ship and iterate
   C — People-first, I build through teams
   D — Strategic, I zoom out and connect dots
   E — A mix (tell me)"

## PHASE 6 — HANDOFF MESSAGE
"That's everything — thank you for taking the time to share all of this.

Raz Belisha will personally review your details and get started on building your resume. You'll hear from him soon.

One moment while I prepare your profile summary..."

Then immediately generate the JSON output.

## PHASE 7 — JSON OUTPUT
Output this exact block, filled with all collected data:

INTAKE_JSON_START
{
  "meta": {
    "intake_date": "[today's date]",
    "language": "[english or hebrew]",
    "completeness_score": "[high / medium / low]",
    "resume_raw": "[full original resume text pasted by client]"
  },
  "identity": {
    "name": "",
    "email": "",
    "phone": "",
    "location": ""
  },
  "target": {
    "role": "",
    "seniority": "",
    "industry": "",
    "search_reason": ""
  },
  "experience": [
    {
      "company": "",
      "title": "",
      "dates": "",
      "responsibilities": [],
      "achievements_raw": [],
      "achievements_quantified": []
    }
  ],
  "education": [
    {
      "institution": "",
      "degree": "",
      "field": "",
      "year": "",
      "gpa": "",
      "notable_courses": [],
      "honors": []
    }
  ],
  "skills": {
    "technical": [],
    "soft": [],
    "languages": []
  },
  "job_descriptions": [
    {
      "title": "",
      "company": "",
      "jd_text_raw": "",
      "keywords_extracted": []
    }
  ],
  "keywords": {
    "confirmed": [],
    "approved": [],
    "partial": [],
    "missing": []
  },
  "personal_layer": {
    "projects": [],
    "hobbies": [],
    "unusual_facts": "",
    "working_style": "",
    "personality_notes": ""
  }
}
INTAKE_JSON_END

After outputting JSON say:
"Your profile is complete and has been sent to Raz. You'll hear from him soon."

## TONE GUIDE
- Warm but efficient. Like a smart assistant who respects the client's time.
- Never robotic. Never say "I have recorded your answer."
- Use "Great!" sparingly — not after every message.
- Never mention AI, Claude, Anthropic, or automation.
- If asked about building the resume: "That's handled personally by Raz on his end."
- If asked who this is: "This is the intake process for Raz Belisha's resume service."`;

  // ─── STATE ────────────────────────────────────────────────────────────────
  const conversationHistory = [];
  let intakeComplete = false;

  // ─── INIT EMAILJS ─────────────────────────────────────────────────────────
  emailjs.init(EMAILJS_PUBLIC_KEY);

  // ─── DOM REFS ─────────────────────────────────────────────────────────────
  const messagesEl    = document.getElementById('messages');
  const inputEl       = document.getElementById('user-input');
  const sendBtn       = document.getElementById('send-btn');
  const statusNote    = document.getElementById('status-note');
  const intakePanel   = document.getElementById('intake-panel');
  const chatWrapper   = document.getElementById('chat-wrapper');
  const inputWrapper  = document.getElementById('input-wrapper');
  const startBtn          = document.getElementById('start-btn');
  const startError        = document.getElementById('start-error');
  const resumeFileEl      = document.getElementById('resume-file');
  const resumeTextEl      = document.getElementById('resume-text');
  const uploadZone        = document.getElementById('upload-zone');
  const uploadConfirmed   = document.getElementById('upload-confirmed');
  const uploadFilenameEl  = document.getElementById('upload-filename');
  const uploadRemoveBtn   = document.getElementById('upload-remove-btn');
  const pasteArea         = document.getElementById('paste-area');
  const jdField1          = document.getElementById('jd-1');
  const jdField2          = document.getElementById('jd-2');
  const jdField3          = document.getElementById('jd-3');

  // Stores extracted text from uploaded file (if any)
  let uploadedResumeText = '';

  // ─── FILE UPLOAD ──────────────────────────────────────────────────────────
  resumeFileEl.addEventListener('change', async () => {
    const file = resumeFileEl.files[0];
    if (!file) return;

    uploadFilenameEl.textContent = file.name;

    if (file.type === 'text/plain' || file.name.endsWith('.txt')) {
      // Read text directly
      uploadedResumeText = await file.text();
    } else {
      // PDF/doc — store file name; we'll use pasted text if provided
      uploadedResumeText = `[Uploaded file: ${file.name}]`;
    }

    // Show confirmation, hide upload zone and paste area
    uploadZone.style.display      = 'none';
    uploadConfirmed.style.display = 'flex';
    pasteArea.style.display       = 'none';
    startError.style.display      = 'none';
  });

  // ─── REMOVE FILE ──────────────────────────────────────────────────────────
  uploadRemoveBtn.addEventListener('click', (e) => {
    e.stopPropagation();
    uploadedResumeText        = '';
    resumeFileEl.value        = '';
    uploadZone.style.display      = 'flex';
    uploadConfirmed.style.display = 'none';
    pasteArea.style.display       = 'block';
  });

  // ─── START INTAKE ─────────────────────────────────────────────────────────
  startBtn.addEventListener('click', async () => {
    const pastedResume = resumeTextEl.value.trim();
    // Use uploaded file text if available, otherwise fall back to pasted text
    const resume = uploadedResumeText || pastedResume;
    const jd1    = jdField1.value.trim();
    const jd2    = jdField2.value.trim();
    const jd3    = jdField3.value.trim();

    if (!resume) {
      startError.textContent = 'Please upload your resume or paste your text below.';
      startError.style.display = 'block';
      return;
    }

    startError.style.display = 'none';
    startBtn.disabled = true;
    startBtn.textContent = 'Starting…';

    // Build first user message from the panel inputs
    let firstMsg = `Here is my resume:\n\n${resume}`;
    const jdParts = [jd1, jd2, jd3].filter(Boolean);
    if (jdParts.length > 0) {
      firstMsg += `\n\n---\n\nHere are the job descriptions I'm targeting:\n\n`;
      jdParts.forEach((jd, i) => {
        firstMsg += `Position ${i + 1}:\n${jd}\n\n`;
      });
    }

    // Switch to chat view
    intakePanel.style.display = 'none';
    chatWrapper.style.display = 'flex';
    inputWrapper.style.display = 'block';

    // Show a truncated version of what was submitted as a user bubble
    const preview = resume.slice(0, 120).replace(/\n+/g, ' ') + (resume.length > 120 ? '…' : '');
    const jdCount = jdParts.length;
    const jdNote  = jdCount > 0 ? ` + ${jdCount} job description${jdCount > 1 ? 's' : ''}` : '';
    appendMessage('user', `📄 Resume shared${jdNote}\n"${preview}"`);

    conversationHistory.push({ role: 'user', content: firstMsg });
    showTyping();
    sendBtn.disabled = true;

    try {
      const reply = await callBackend(conversationHistory);
      removeTyping();

      const jsonData = extractIntakeJSON(reply);
      let visibleReply = reply;
      if (jsonData) {
        const start = reply.indexOf('INTAKE_JSON_START');
        const end   = reply.indexOf('INTAKE_JSON_END') + 'INTAKE_JSON_END'.length;
        visibleReply = (reply.slice(0, start) + reply.slice(end)).trim();
        intakeComplete = true;
        sendIntakeEmail(jsonData);
      }

      appendMessage('assistant', visibleReply);
      conversationHistory.push({ role: 'assistant', content: reply });

      if (intakeComplete) {
        sendBtn.disabled = true;
        inputEl.disabled = true;
        inputEl.placeholder = 'Intake complete.';
      } else {
        sendBtn.disabled = false;
        inputEl.focus();
      }
    } catch (err) {
      removeTyping();
      appendMessage('assistant', 'Something went wrong. Please refresh and try again.');
      console.error(err);
      sendBtn.disabled = false;
    }
  });

  // ─── AUTO-RESIZE TEXTAREA ─────────────────────────────────────────────────
  inputEl.addEventListener('input', () => {
    inputEl.style.height = 'auto';
    inputEl.style.height = Math.min(inputEl.scrollHeight, 160) + 'px';
  });

  inputEl.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      handleSend();
    }
  });

  sendBtn.addEventListener('click', handleSend);

  // ─── OPTION DETECTION ─────────────────────────────────────────────────────
  // Matches lines like "A — ...", "B — ...", "A - ...", "A) ..." etc.
  const OPTION_RE = /^([A-E])\s*[—\-–)]\s*(.+)$/;
  // Detect "other/else/tell me" options (user will need a free-text field)
  const OTHER_RE  = /tell me|something (else|different|other)|other|אחר|ספר/i;

  function parseOptions(text) {
    const lines = text.split('\n');
    const options = [];
    const nonOptionLines = [];

    for (const line of lines) {
      const m = line.trim().match(OPTION_RE);
      if (m) {
        options.push({ letter: m[1], label: m[2].trim(), full: line.trim() });
      } else {
        nonOptionLines.push(line);
      }
    }

    if (options.length >= 2) {
      return { prose: nonOptionLines.join('\n').trim(), options };
    }
    return { prose: text, options: [] };
  }

  // ─── RENDER HELPERS ───────────────────────────────────────────────────────
  function appendMessage(role, text) {
    const wrapper = document.createElement('div');
    wrapper.classList.add('msg', role);

    if (role === 'assistant') {
      const { prose, options } = parseOptions(text);

      if (prose) {
        const bubble = document.createElement('div');
        bubble.classList.add('bubble');
        bubble.textContent = prose;
        wrapper.appendChild(bubble);
      }

      if (options.length) {
        const group = document.createElement('div');
        group.classList.add('options-group');

        const selected = new Set();

        // Other text input (hidden until an "other" option is selected)
        const otherInput = document.createElement('input');
        otherInput.type = 'text';
        otherInput.placeholder = 'Tell me more…';
        otherInput.classList.add('other-input');

        // Confirm button
        const confirmRow = document.createElement('div');
        confirmRow.classList.add('confirm-row');
        const confirmBtn = document.createElement('button');
        confirmBtn.classList.add('confirm-btn');
        confirmBtn.textContent = 'Confirm →';
        confirmRow.appendChild(confirmBtn);

        const updateUI = () => {
          const hasOther = [...selected].some(k => {
            const opt = options.find(o => o.letter === k);
            return opt && OTHER_RE.test(opt.label);
          });
          otherInput.classList.toggle('visible', hasOther);
          confirmBtn.classList.toggle('visible', selected.size > 0);
        };

        options.forEach(({ letter, label }) => {
          const btn = document.createElement('button');
          btn.classList.add('option-btn');

          const check = document.createElement('span');
          check.classList.add('check');
          check.textContent = '✓';

          btn.appendChild(check);
          btn.appendChild(document.createTextNode(`${letter} — ${label}`));

          btn.addEventListener('click', () => {
            if (intakeComplete) return;
            if (selected.has(letter)) {
              selected.delete(letter);
              btn.classList.remove('selected');
            } else {
              selected.add(letter);
              btn.classList.add('selected');
            }
            updateUI();
          });

          group.appendChild(btn);
        });

        group.appendChild(otherInput);
        group.appendChild(confirmRow);

        // Confirm handler
        confirmBtn.addEventListener('click', () => {
          if (intakeComplete || selected.size === 0) return;

          // Lock all buttons
          group.querySelectorAll('.option-btn').forEach(b => b.disabled = true);
          otherInput.disabled = true;
          confirmBtn.disabled = true;

          // Build the message
          const parts = [...selected].sort().map(letter => {
            const opt = options.find(o => o.letter === letter);
            return opt ? `${opt.letter} — ${opt.label}` : letter;
          });

          const otherText = otherInput.value.trim();
          let message = parts.join(', ');
          if (otherText) message += ` — ${otherText}`;

          submitUserMessage(message);
        });

        wrapper.appendChild(group);
      }
    } else {
      const bubble = document.createElement('div');
      bubble.classList.add('bubble');
      bubble.textContent = text;
      wrapper.appendChild(bubble);
    }

    messagesEl.appendChild(wrapper);
    scrollToBottom();
  }

  function showTyping() {
    const wrapper = document.createElement('div');
    wrapper.classList.add('msg', 'assistant');
    wrapper.id = 'typing-msg';
    wrapper.innerHTML = `<div class="typing-indicator"><span></span><span></span><span></span></div>`;
    messagesEl.appendChild(wrapper);
    scrollToBottom();
  }

  function removeTyping() {
    const el = document.getElementById('typing-msg');
    if (el) el.remove();
  }

  function scrollToBottom() {
    window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
  }

  // ─── EXTRACT JSON FROM RESPONSE ───────────────────────────────────────────
  function extractIntakeJSON(text) {
    const start = text.indexOf('INTAKE_JSON_START');
    const end   = text.indexOf('INTAKE_JSON_END');
    if (start === -1 || end === -1) return null;
    const raw = text.slice(start + 'INTAKE_JSON_START'.length, end).trim();
    try { return JSON.parse(raw); } catch { return null; }
  }

  // ─── SEND EMAIL VIA EMAILJS ───────────────────────────────────────────────
  async function sendIntakeEmail(jsonData) {
    const jsonString = JSON.stringify(jsonData, null, 2);
    const clientName = jsonData?.identity?.name || 'Unknown Client';
    try {
      await emailjs.send(EMAILJS_SERVICE_ID, EMAILJS_TEMPLATE_ID, {
        to_email:    RECIPIENT_EMAIL,
        client_name: clientName,
        intake_json: jsonString,
        intake_date: jsonData?.meta?.intake_date || new Date().toLocaleDateString(),
      });
      statusNote.textContent = 'Profile delivered to Raz.';
    } catch (err) {
      console.error('EmailJS error:', err);
      statusNote.textContent = 'Note: email delivery encountered an issue.';
    }
  }

  // ─── CALL BACKEND ─────────────────────────────────────────────────────────
  async function callBackend(messages) {
    const response = await fetch('/.netlify/functions/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ messages, system: SYSTEM_PROMPT }),
    });

    if (!response.ok) throw new Error(`Backend error: ${response.status}`);

    const data = await response.json();
    if (data.error) throw new Error(data.error.message || JSON.stringify(data.error));
    return data.content?.[0]?.text || '';
  }

  // ─── SHARED SUBMIT LOGIC ──────────────────────────────────────────────────
  async function submitUserMessage(text) {
    if (!text || intakeComplete) return;

    appendMessage('user', text);
    conversationHistory.push({ role: 'user', content: text });

    sendBtn.disabled = true;
    showTyping();

    try {
      const reply = await callBackend(conversationHistory);
      removeTyping();

      const jsonData = extractIntakeJSON(reply);
      let visibleReply = reply;

      if (jsonData) {
        const start = reply.indexOf('INTAKE_JSON_START');
        const end   = reply.indexOf('INTAKE_JSON_END') + 'INTAKE_JSON_END'.length;
        visibleReply = (reply.slice(0, start) + reply.slice(end)).trim();
        intakeComplete = true;
        sendIntakeEmail(jsonData);
      }

      appendMessage('assistant', visibleReply);
      conversationHistory.push({ role: 'assistant', content: reply });

      if (intakeComplete) {
        sendBtn.disabled = true;
        inputEl.disabled = true;
        inputEl.placeholder = 'Intake complete.';
      } else {
        sendBtn.disabled = false;
        inputEl.focus();
      }

    } catch (err) {
      removeTyping();
      appendMessage('assistant', 'Something went wrong. Please refresh the page and try again.');
      console.error(err);
      sendBtn.disabled = false;
    }
  }

  // ─── MAIN SEND HANDLER ────────────────────────────────────────────────────
  async function handleSend() {
    const userText = inputEl.value.trim();
    if (!userText || intakeComplete) return;
    inputEl.value = '';
    inputEl.style.height = 'auto';
    await submitUserMessage(userText);
  }
</script>
</body>
